services:
  app:
    build: .
    container_name: wb_app
    working_dir: /var/www
    volumes:
      - .:/var/www
    command: sh -c "
        composer install &&
        php artisan migrate --force &&
        php artisan serve --host=0.0.0.0 --port=8000
      "
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - APP_ENV=local

  db:
    image: mysql:8
    container_name: wb_db
    restart: always
    environment:
      MYSQL_DATABASE: wb_sync
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  queue:
    container_name: wb_queue
    build: .
    working_dir: /var/www
    command: sh -c "
        echo 'Waiting for DB...' &&
        sleep 10 &&
        php artisan queue:work --tries=3 --timeout=90 --verbose
      "
    restart: always
    volumes:
      - .:/var/www
    depends_on:
      - app
      - db
    environment:
      - APP_ENV=local

volumes:
  db_data:
