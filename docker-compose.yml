version: '3.8'

services:
  app:
    build: .
    container_name: wb_app
    working_dir: /var/www
    volumes:
      - .:/var/www
    command: sh -c "composer install && php artisan serve --host=0.0.0.0 --port=8000"
    ports:
      - "8000:8000"
    depends_on:
      - db

  db:
    image: mysql:8
    container_name: wb_db
    restart: always
    environment:
      MYSQL_DATABASE: wb_sync
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
